<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国居民存款曲线 - 10年数据</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        #chart { width: 100%; height: 600px; margin: 20px auto; }
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
    <h1 style="text-align:center">中国居民存款曲线（过去10年）</h1>
    <div id="chart"></div>
    
    <script>
        // 加载数据
        fetch('data/deposit_data.json')
            .then(response => response.json())
            .then(data => {
                const chart = echarts.init(document.getElementById('chart'));
                
                const option = {
                    title: { text: '居民存款总额趋势', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    xAxis: {
                        type: 'category',
                        data: data.deposits.map(d => d.month),
                        axisLabel: { rotate: 45 }
                    },
                    yAxis: {
                        type: 'value',
                        name: '万亿元'
                    },
                    series: [{
                        name: '居民存款',
                        type: 'line',
                        data: data.deposits.map(d => d.amount),
                        smooth: true,
                        areaStyle: {}
                    }]
                };
                
                chart.setOption(option);
            });
    </script>
</body>
</html>
