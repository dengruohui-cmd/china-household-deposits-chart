name: Update Household Deposits Data

on:
  schedule:
    # 每月15日 UTC 时间 02:00 运行（北京时间 10:00）
    # PBOC 通常在每月10-15日发布上月数据
    - cron: '0 2 15 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pandas
        
    - name: Fetch latest data from PBOC
      id: fetch
      run: |
        python << 'EOF'
        import requests
        import json
        import re
        from datetime import datetime, timedelta
        import os
        
        # 尝试从PBOC获取最新数据
        def fetch_pboc_data():
            try:
                # PBOC 统计月报页面
                url = "http://www.pbc.gov.cn/zhengcehuobisi/11111/index.html"
                headers = {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                }
                
                response = requests.get(url, headers=headers, timeout=30)
                response.encoding = 'utf-8'
                
                # 这里需要根据实际页面结构解析数据
                # 由于PBOC网站结构复杂，这里使用备用方案：从已知的统计公报中提取
                
                return None
            except Exception as e:
                print(f"Fetch error: {e}")
                return None
        
        # 读取现有数据
        with open('data/deposits.json', 'r', encoding='utf-8') as f:
            data = json.load(f)
        
        # 获取最后一条数据的日期
        last_date = data[-1]['date']
        last_year, last_month = map(int, last_date.split('-'))
        
        # 生成下一个月的数据（模拟或从其他API获取）
        # 实际应用中，这里应该调用真实的API或爬虫
        
        next_month = last_month + 1
        next_year = last_year
        if next_month > 12:
            next_month = 1
            next_year += 1
            
        # 检查是否已经是最新月份
        current_date = datetime.now()
        if next_year > current_date.year or (next_year == current_date.year and next_month > current_date.month):
            print("Already up to date")
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write("updated=false\n")
        else:
            # 这里应该添加真实的数据获取逻辑
            # 暂时标记为需要手动更新
            print(f"Would add data for {next_year}-{next_month:02d}")
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write("updated=false\n")
                f.write("needs_manual=true\n")
        
        EOF
      env:
        GITHUB_OUTPUT: $GITHUB_OUTPUT
        
    - name: Create Issue for Manual Update
      if: steps.fetch.outputs.needs_manual == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '📊 需要更新住户存款数据',
            body: '每月数据更新任务已触发，请检查PBOC最新发布的金融统计数据并手动更新 `data/deposits.json` 文件。\n\n数据来源：http://www.pbc.gov.cn/zhengcehuobisi/11111/index.html',
            labels: ['data-update', 'automated']
          });
          
    - name: Commit and push if changed
      if: steps.fetch.outputs.updated == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/deposits.json
        git commit -m "📊 自动更新住户存款数据: $(date +'%Y-%m-%d')" || exit 0
        git push
